name: work-report-system

services:
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: work-report-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle_admin
      APP_USER: work_report
      APP_USER_PASSWORD: work_report
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/init:/container-entrypoint-initdb.d:ro
      - ./src/main/resources/sql:/opt/work-report-system/sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  oracle-data:
