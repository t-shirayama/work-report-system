services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: work-report-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-WorkReport!2026}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-WorkReport!2026}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      SQLSERVER_HOST: sqlserver
      SQLSERVER_DATABASE: WorkReport
      DB_SEED_MODE: "${DB_SEED_MODE:-sample}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-WorkReport!2026}"
    volumes:
      - ./database/sqlserver:/sql:ro
    command: ["/bin/bash", "/sql/init-db.sh"]
    restart: "no"

  db-reset:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["reset"]
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      SQLSERVER_HOST: sqlserver
      SQLSERVER_DATABASE: WorkReport
      DB_SEED_MODE: "${DB_SEED_MODE:-sample}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-WorkReport!2026}"
    volumes:
      - ./database/sqlserver:/sql:ro
    command: ["/bin/bash", "/sql/reset-db.sh"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/WorkReport.Api/Dockerfile
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__WorkReport: "Server=sqlserver,1433;Database=WorkReport;User Id=sa;Password=${MSSQL_SA_PASSWORD:-WorkReport!2026};TrustServerCertificate=True"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      ReportStorage__BasePath: "/app/generated-reports"
    ports:
      - "5000:8080"
    volumes:
      - report-files:/app/generated-reports

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:5000/api"
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  sqlserver-data:
  report-files:
